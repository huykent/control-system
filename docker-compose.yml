services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lan-control
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/database
    environment:
      - NODE_ENV=production
      - PORT=3000
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
