services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lan-control
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - lan_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_DIR=/app/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: lan-control-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiODg0MWI3MmVjOWI3MGFlMWEzZTE5Njk3ODNkYmRiOGIiLCJ0IjoiYTdiYzJlY2QtNzRkNS00ZDg4LTkxNDItYzE3MmJmNTk3NGY4IiwicyI6IllUSXhOR0pqT0dVdE5URXhNaTAwTmpJM0xUazRNVEV0WVdVell6VXlaVGd5WmpnMSJ9
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  lan_data:
